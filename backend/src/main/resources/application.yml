spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/employee_portal
    username: emp_user
    password: emp_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns the schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08}
  access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}      # 15 min
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000} # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.employeeportal: DEBUG
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%logger{36}","msg":"%m"}%n'
